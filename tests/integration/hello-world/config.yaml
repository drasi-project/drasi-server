id: hello-world-server
host: "0.0.0.0"
port: 8080
logLevel: info
persistConfig: false
# The smoke test pre-installs required plugins into bin/plugins/ via the
# binary's `plugin install` CLI before starting the server, so startup-time
# auto-install is unnecessary. Signature verification is disabled because
# the test runs offline against a freshly built binary.
autoInstallPlugins: true
verifyPlugins: false

plugins:
  - ref: source/mock
  - ref: reaction/log

sources:
  - kind: mock
    id: test-source
    autoStart: true
    dataType:
      type: sensorReading
    intervalMs: 3000

queries:
  - id: all-sensors
    autoStart: true
    query: |
      MATCH (s:SensorReading)
      RETURN s.sensor_id AS SensorId, s.temperature AS Temperature, s.humidity AS Humidity
    queryLanguage: Cypher
    sources:
      - sourceId: test-source

reactions:
  - kind: log
    id: console-logger
    queries:
      - all-sensors
    autoStart: true
    defaultTemplate:
      added:
        template: "[+] Sensor {{after.SensorId}}: temp={{after.Temperature}}°C humidity={{after.Humidity}}%"
      updated:
        template: "[~] Sensor {{after.SensorId}}: temp={{after.Temperature}}°C humidity={{after.Humidity}}%"
      deleted:
        template: "[-] Sensor {{before.SensorId}} removed"