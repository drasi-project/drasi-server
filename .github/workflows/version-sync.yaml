# Version Sync
#
# Part 1 of the two-part release process. This workflow keeps drasi-server's
# package version in lockstep with the upstream drasi-lib crate:
#
#   1. Fetches the latest stable drasi-lib version from crates.io.
#   2. Bumps every drasi-* dependency in Cargo.toml to its latest published
#      version (allowing incompatible/major bumps).
#   3. Mirrors the package version to the latest drasi-lib version (exact
#      mirror), unless a manual version_override is provided.
#   4. Opens a pull request with the changes.
#
# Part 2: once the PR is reviewed and merged, run the "Build and Release"
# workflow (release.yaml), which reads the new version from Cargo.toml.

name: Version Sync

on:
  workflow_dispatch:
    inputs:
      version_override:
        description: 'Override package version (e.g. for a server-only fix). Leave blank to mirror the latest drasi-lib version.'
        required: false
        default: ''
      dry_run:
        description: 'Dry run — write changes to Cargo.toml/Cargo.lock locally without opening a PR'
        required: false
        type: boolean
        default: false
  # Allow other workflows (e.g. a drasi-core release pipeline) to invoke this
  # version sync as a reusable workflow once an upstream release is published.
  workflow_call:
    inputs:
      version_override:
        description: 'Override package version (e.g. for a server-only fix). Leave blank to mirror the latest drasi-lib version.'
        required: false
        type: string
        default: ''
      dry_run:
        description: 'Dry run — write changes to Cargo.toml/Cargo.lock locally without opening a PR'
        required: false
        type: boolean
        default: false

permissions:
  contents: write
  pull-requests: write

jobs:
  version-sync:
    name: Sync version with drasi-lib
    runs-on: ubuntu-latest
    # This job only edits Cargo.toml / Cargo.lock — it never compiles
    # drasi-server — so it is safe to ignore the repo's pinned toolchain
    # (rust-toolchain.toml pins 1.88.0) and use a newer stable. Recent cargo-edit
    # releases pull in transitive deps (e.g. smol_str) that require rustc 1.89+.
    env:
      RUSTUP_TOOLCHAIN: stable
    steps:
      - name: Checkout code
        uses: actions/checkout@v6

      - name: Install Rust toolchain
        uses: dtolnay/rust-toolchain@29eef336d9b2848a0b548edc03f92a220660cdb8 # stable
        with:
          toolchain: stable

      - name: Install cargo-edit
        run: cargo install cargo-edit --locked

      - name: Determine target version
        id: version
        # Pass the untrusted input via the environment, never via ${{ }}
        # interpolation directly into the shell script — template expansion
        # happens before the shell runs, so interpolated values could inject
        # arbitrary shell commands.
        env:
          VERSION_OVERRIDE: ${{ inputs.version_override }}
        run: |
          set -euo pipefail

          OVERRIDE="${VERSION_OVERRIDE}"
          if [ -n "$OVERRIDE" ]; then
            NEW_VERSION="$OVERRIDE"
            echo "Using manual version_override: ${NEW_VERSION}"
          else
            # crates.io requires a descriptive User-Agent.
            NEW_VERSION=$(curl -sSL \
              -H "User-Agent: drasi-server-version-sync (https://github.com/drasi-project/drasi-server)" \
              https://crates.io/api/v1/crates/drasi-lib | jq -r '.crate.max_stable_version')
            echo "Latest stable drasi-lib on crates.io: ${NEW_VERSION}"
          fi

          if [ -z "$NEW_VERSION" ] || [ "$NEW_VERSION" = "null" ]; then
            echo "::error::Could not determine target version (got '${NEW_VERSION}')."
            exit 1
          fi

          if ! echo "$NEW_VERSION" | grep -Eq '^[0-9]+\.[0-9]+\.[0-9]+(-[0-9A-Za-z-]+(\.[0-9A-Za-z-]+)*)?(\+[0-9A-Za-z-]+(\.[0-9A-Za-z-]+)*)?$'; then
            echo "::error::Resolved version '${NEW_VERSION}' is not a valid semver."
            exit 1
          fi

          CURRENT_VERSION=$(grep '^version = ' Cargo.toml | head -1 | sed 's/version = "\(.*\)"/\1/')
          [ -n "$CURRENT_VERSION" ] || { echo "::error::Could not parse current version from Cargo.toml"; exit 1; }
          echo "Current drasi-server version: ${CURRENT_VERSION}"

          echo "new_version=${NEW_VERSION}" >> "$GITHUB_OUTPUT"
          echo "current_version=${CURRENT_VERSION}" >> "$GITHUB_OUTPUT"

      - name: Bump drasi-* dependencies to latest
        run: |
          set -euo pipefail

          # Derive the list of drasi-* dependencies directly from the manifest
          # (via cargo metadata) so it stays authoritative — adding a new
          # drasi-* dependency to Cargo.toml requires no change here. Covers
          # normal, dev, and build dependencies across all workspace members.
          mapfile -t DRASI_PACKAGES < <(
            cargo metadata --no-deps --format-version 1 \
              | jq -r '.packages[].dependencies[].name' \
              | grep '^drasi-' \
              | sort -u
          )

          if [ "${#DRASI_PACKAGES[@]}" -eq 0 ]; then
            echo "::error::No drasi-* dependencies found in Cargo.toml."
            exit 1
          fi

          echo "drasi-* dependencies to upgrade: ${DRASI_PACKAGES[*]}"

          # cargo upgrade updates every occurrence in Cargo.toml. --incompatible
          # allows pre-1.0 minor bumps (e.g. 0.8.x -> 0.9.0).
          UPGRADE_ARGS=()
          for pkg in "${DRASI_PACKAGES[@]}"; do
            UPGRADE_ARGS+=(--package "$pkg")
          done

          echo "Upgrading drasi-* dependency requirements..."
          cargo upgrade --incompatible "${UPGRADE_ARGS[@]}"

          echo "Refreshing Cargo.lock for upgraded packages..."
          UPDATE_ARGS=()
          for pkg in "${DRASI_PACKAGES[@]}"; do
            UPDATE_ARGS+=(--package "$pkg")
          done
          cargo update "${UPDATE_ARGS[@]}"

      - name: Validate upgraded dependencies compile
        # cargo upgrade --incompatible can pull in API-breaking minor bumps
        # (e.g. 0.8.x -> 0.9.0). Compile with the project's pinned toolchain to
        # catch breakage here — opening a PR that fails to build is worse than
        # opening no PR at all.
        run: cargo check --workspace --locked

      - name: Set package version
        env:
          NEW_VERSION_OUTPUT: ${{ steps.version.outputs.new_version }}
        run: |
          set -euo pipefail
          cargo set-version "${NEW_VERSION_OUTPUT}"

      - name: Detect changes and build summary
        id: changes
        run: |
          set -euo pipefail

          if git diff --quiet -- Cargo.toml Cargo.lock; then
            echo "No version or dependency changes detected — nothing to do."
            echo "changed=false" >> "$GITHUB_OUTPUT"
            exit 0
          fi

          echo "changed=true" >> "$GITHUB_OUTPUT"

          {
            echo "## Version Sync"
            echo ""
            echo "Package version: \`${{ steps.version.outputs.current_version }}\` → \`${{ steps.version.outputs.new_version }}\`"
            echo ""
            echo "### Changed dependency requirements"
            echo ""
            echo '```diff'
            git diff -- Cargo.toml | grep -E '^[+-]drasi-' || echo "(no drasi-* requirement changes)"
            echo '```'
            echo ""
            echo "Merging this PR updates the version read by the **Build and Release** workflow."
            echo "After merge, manually trigger the **Build and Release** workflow (\`release.yaml\`) via GitHub Actions to publish the release."
          } > pr-body.md

          echo "Summary:"
          cat pr-body.md

      - name: Create Pull Request
        if: steps.changes.outputs.changed == 'true' && inputs.dry_run == false
        uses: peter-evans/create-pull-request@22a9089034f40e5a961c8808d113e2c98fb63676 # v7.0.8
        with:
          # PRs opened with GITHUB_TOKEN do not automatically trigger other
          # workflows; re-run CI on the PR manually if needed.
          token: ${{ secrets.GITHUB_TOKEN }}
          branch: automation/version-sync
          delete-branch: true
          base: main
          commit-message: "chore: sync version to ${{ steps.version.outputs.new_version }}"
          title: "chore: sync version to ${{ steps.version.outputs.new_version }}"
          body-path: pr-body.md
          # Only stage the manifest changes. Without this, the action stages all
          # modified/untracked files (including the generated pr-body.md) into
          # the PR.
          add-paths: |
            Cargo.toml
            Cargo.lock
          labels: |
            automation
            dependencies

      - name: Dry run summary
        if: steps.changes.outputs.changed == 'true' && inputs.dry_run == true
        run: |
          echo "Dry run enabled — changes applied locally but no PR was opened."
          git --no-pager diff -- Cargo.toml
