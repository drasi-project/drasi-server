name: Lint

on:
  pull_request:
    branches:
      - main

jobs:
  lint:
    uses: drasi-project/.github/.github/workflows/rust-lint.yaml@main
    with:
      install-jq: true
      install-protobuf: true
      clippy-command: "make clippy"
      clippy-args: ""
      fmt-command: "make fmt-check"
