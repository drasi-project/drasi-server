# Cargo configuration for drasi-server
#
# To use local path-based dependencies for development:
# 1. Uncomment the [patch.crates-io] section in Cargo.toml
# 2. Run: cargo build
#
# To use published crates from crates.io:
# 1. Keep the [patch.crates-io] section commented out in Cargo.toml
# 2. Run: cargo build

# Cross-compilation target flags (used by `cross` tool)
[target.x86_64-unknown-linux-musl]
rustflags = ["-C", "target-feature=-crt-static"]

[target.aarch64-unknown-linux-musl]
rustflags = ["-C", "target-feature=-crt-static"]

[target.x86_64-pc-windows-gnu]
rustflags = ["-C", "target-feature=+crt-static"]

[patch.crates-io]
drasi-plugin-sdk = { path = "/home/danielgerlag/dev/drasi/drasi-core/components/plugin-sdk" }
drasi-ffi-primitives = { path = "/home/danielgerlag/dev/drasi/drasi-core/components/ffi-primitives" }
drasi-core = { path = "/home/danielgerlag/dev/drasi/drasi-core/core" }
drasi-lib = { path = "/home/danielgerlag/dev/drasi/drasi-core/lib" }
drasi-query-ast = { path = "/home/danielgerlag/dev/drasi/drasi-core/query-ast" }
drasi-query-cypher = { path = "/home/danielgerlag/dev/drasi/drasi-core/query-cypher" }
drasi-query-gql = { path = "/home/danielgerlag/dev/drasi/drasi-core/query-gql" }
drasi-functions-cypher = { path = "/home/danielgerlag/dev/drasi/drasi-core/functions-cypher" }
drasi-functions-gql = { path = "/home/danielgerlag/dev/drasi/drasi-core/functions-gql" }
drasi-middleware = { path = "/home/danielgerlag/dev/drasi/drasi-core/middleware" }
drasi-bootstrap-application = { path = "/home/danielgerlag/dev/drasi/drasi-core/components/bootstrappers/application" }
drasi-bootstrap-noop = { path = "/home/danielgerlag/dev/drasi/drasi-core/components/bootstrappers/noop" }
drasi-reaction-application = { path = "/home/danielgerlag/dev/drasi/drasi-core/components/reactions/application" }
drasi-index-rocksdb = { path = "/home/danielgerlag/dev/drasi/drasi-core/components/indexes/rocksdb" }
