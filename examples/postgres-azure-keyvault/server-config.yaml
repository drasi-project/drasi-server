# Drasi Server — PostgreSQL with Azure Key Vault Secret Store
#
# This configuration demonstrates using the Azure Key Vault secret store plugin
# to resolve passwords from Azure Key Vault instead of hardcoding them.
#
# Before running, store your PostgreSQL password as a secret named "DB-PASSWORD"
# in your Azure Key Vault. (Key Vault secret names use hyphens, not underscores.)

apiVersion: drasi.io/v1
id: postgres-keyvault-demo
host: "0.0.0.0"
port: 8080
logLevel: info

# ──────────────────────────────────────────────────────────────────────
# Secret store: Azure Key Vault
# ──────────────────────────────────────────────────────────────────────
# Uncomment ONE of the authentication methods below.

# Option A — Developer tools (az login / VS Code / IntelliJ)
# Good for local development after running `az login`.
secretStore:
  kind: azure-keyvault
  vaultUrl: https://YOUR-VAULT-NAME.vault.azure.net/
  authMethod: developer_tools

# Option B — System-assigned managed identity (Azure VMs, App Service, ACI)
# No extra fields needed; the identity is attached to the compute resource.
# secretStore:
#   kind: azure-keyvault
#   vaultUrl: https://YOUR-VAULT-NAME.vault.azure.net/
#   authMethod: managed_identity

# Option C — User-assigned managed identity
# secretStore:
#   kind: azure-keyvault
#   vaultUrl: https://YOUR-VAULT-NAME.vault.azure.net/
#   authMethod: managed_identity_user_assigned
#   clientId: "YOUR-USER-ASSIGNED-MI-CLIENT-ID"

# Option D — Workload identity (AKS with federated identity)
# Requires AZURE_TENANT_ID, AZURE_CLIENT_ID, and AZURE_FEDERATED_TOKEN_FILE
# environment variables (set automatically by AKS workload identity webhook).
# secretStore:
#   kind: azure-keyvault
#   vaultUrl: https://YOUR-VAULT-NAME.vault.azure.net/
#   authMethod: workload_identity

# Option E — Service principal with client secret
# secretStore:
#   kind: azure-keyvault
#   vaultUrl: https://YOUR-VAULT-NAME.vault.azure.net/
#   authMethod: client_secret
#   tenantId: "YOUR-TENANT-ID"
#   clientId: "YOUR-CLIENT-ID"
#   clientSecret: "YOUR-CLIENT-SECRET"

# ──────────────────────────────────────────────────────────────────────
# PostgreSQL source — password resolved from Key Vault at runtime
# ──────────────────────────────────────────────────────────────────────
sources:
  - kind: postgres
    id: pg-sensors
    autoStart: true
    host: localhost
    port: 5432
    user: postgres
    password:
      kind: Secret
      name: DB-PASSWORD          # must match the Key Vault secret name
    database: drasi_demo
    slotName: drasi_slot
    publicationName: drasi_pub
    tables:
      - sensors

# Continuous query: sensors with high temperature
queries:
  - id: high-temp
    query: "MATCH (s:Sensor) WHERE s.temperature > 75 RETURN s.id, s.name, s.location, s.temperature"
    queryLanguage: Cypher
    sources:
      - sourceId: pg-sensors
    autoStart: true

# Log reaction: prints change events to stdout
reactions:
  - kind: log
    id: log-temps
    queries:
      - high-temp
    autoStart: true
