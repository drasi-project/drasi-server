apiVersion: drasi.io/v1
id: trading-server
host: 0.0.0.0
port: 8280
logLevel: info
persistConfig: false
verifyPlugins: false
autoInstallPlugins: true
sources:
- kind: http
  id: price-feed
  autoStart: true
  host: 0.0.0.0
  port: 9100
  timeoutMs: 10000
  bootstrapProvider:
    kind: scriptfile
    filePaths:
      - ./examples/trading/mock-generator/initial-prices.jsonl
- kind: postgres
  id: postgres-stocks
  autoStart: true
  host: trading-postgres
  port: 5432
  database: trading_demo
  user: drasi_user
  password: drasi_password
  tables:
  - stocks
  - portfolio
  - watchlist
  slotName: drasi_trading_slot
  publicationName: drasi_trading_pub
  sslMode: prefer
  tableKeys:
  - table: stocks
    keyColumns:
    - id
  - table: portfolio
    keyColumns:
    - id
  - table: watchlist
    keyColumns:
    - id
  bootstrapProvider:
    kind: postgres
- kind: postgres
  id: postgres-broker
  autoStart: true
  host: trading-postgres
  port: 5432
  database: trading_demo
  user: drasi_user
  password: drasi_password
  tables:
  - limit_orders
  slotName: drasi_broker_slot
  publicationName: drasi_broker_pub
  sslMode: prefer
  tableKeys:
  - table: limit_orders
    keyColumns:
    - id
  bootstrapProvider:
    kind: postgres
queries: []
reactions: []
