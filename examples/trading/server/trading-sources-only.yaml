apiVersion: drasi.io/v1
id: trading-server
host: 0.0.0.0
port: 8280
logLevel: info
persistConfig: false
verifyPlugins: false
# Plugins (source/http, source/postgres, bootstrap/scriptfile, bootstrap/postgres,
# reaction/sse) are downloaded from the OCI registry (ghcr.io/drasi-project) on
# first server startup. No manual `cargo install` or `make build-local-plugins`
# required.
#
# Declaring the exact set under `plugins:` is important: without it, the demo
# would either fall back to scanning a directory containing ALL ~50 drasi-core
# plugins (which exhausts macOS's default 256 file-descriptor limit and crashes
# the server with errno=24 / EMFILE), or autoInstallPlugins would have nothing
# to download (auto-install only fetches refs that are declared here).
autoInstallPlugins: true
plugins:
  - ref: source/http
  - ref: source/postgres
  - ref: bootstrap/scriptfile
  - ref: bootstrap/postgres
  # `reaction/sse` is created at runtime by the React app via the Drasi REST API
  # (see app/src/drasi/config.ts), so it must be present in the plugins dir even
  # though the YAML below has no entry under `reactions:`.
  - ref: reaction/sse
sources:
- kind: http
  id: price-feed
  autoStart: true
  host: 0.0.0.0
  port: 9100
  timeoutMs: 10000
  bootstrapProvider:
    kind: scriptfile
    filePaths:
      - ./examples/trading/mock-generator/initial-prices.jsonl
- kind: postgres
  id: postgres-stocks
  autoStart: true
  # Bare-metal default: localhost:5632 (docker-compose publishes 5432 -> 5632).
  # Dev container overrides via POSTGRES_HOST=trading-postgres / POSTGRES_PORT=5432
  # (set in .devcontainer/trading/devcontainer.json) so drasi-server reaches
  # postgres over the shared `drasi-network`.
  host: "${POSTGRES_HOST:-localhost}"
  port: "${POSTGRES_PORT:-5632}"
  database: trading_demo
  user: drasi_user
  password: drasi_password
  tables:
  - stocks
  - portfolio
  - watchlist
  slotName: drasi_trading_slot
  publicationName: drasi_trading_pub
  sslMode: prefer
  tableKeys:
  - table: stocks
    keyColumns:
    - id
  - table: portfolio
    keyColumns:
    - id
  - table: watchlist
    keyColumns:
    - id
  bootstrapProvider:
    kind: postgres
- kind: postgres
  id: postgres-broker
  autoStart: true
  host: "${POSTGRES_HOST:-localhost}"
  port: "${POSTGRES_PORT:-5632}"
  database: trading_demo
  user: drasi_user
  password: drasi_password
  tables:
  - limit_orders
  slotName: drasi_broker_slot
  publicationName: drasi_broker_pub
  sslMode: prefer
  tableKeys:
  - table: limit_orders
    keyColumns:
    - id
  bootstrapProvider:
    kind: postgres
queries: []
reactions: []
